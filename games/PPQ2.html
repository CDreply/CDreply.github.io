<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>沉哒乒乓</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(0,170,255,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(255,0,170,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 820px;
      padding: 0 8px;
    }

    /* 标题 */
    #title {
      font-size: clamp(20px, 5vw, 36px);
      font-weight: 900;
      background: linear-gradient(135deg, #0af, #f0a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
    }
    #best-record {
      font-size: clamp(10px, 2.5vw, 12px);
      color: #fb0;
      margin-top: -4px;
      margin-bottom: 2px;
    }
    /* 单人模式下才显示 best-record */
    body.pvp-mode #best-record { display: none; }

    /* ===== HUD（单人模式）===== */
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      gap: 4px;
    }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .hud-label {
      font-size: clamp(8px, 1.8vw, 11px);
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hud-value {
      font-size: clamp(16px, 4vw, 28px);
      font-weight: 800;
    }
    #player-score  { color: #0af; text-shadow: 0 0 15px rgba(0,170,255,0.6); }
    #ai-score      { color: #f0a; text-shadow: 0 0 15px rgba(255,0,170,0.6); }
    #level-display { color: #fb0; text-shadow: 0 0 15px rgba(255,187,0,0.6); }
    #streak-display{ color: #0fb; text-shadow: 0 0 15px rgba(0,255,187,0.6); }
    #difficulty-display { color: #a5f; text-shadow: 0 0 15px rgba(170,85,255,0.6); }

    /* ===== PVP 计分板（上方蓝方）===== */
    #pvp-hud-blue {
      display: none;
      width: 100%;
      padding: 8px 20px;
      background: rgba(0,170,255,0.08);
      border: 1px solid rgba(0,170,255,0.25);
      border-radius: 12px;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #pvp-hud-blue .pvp-label {
      font-size: clamp(10px, 2.5vw, 13px);
      color: rgba(0,170,255,0.7);
      letter-spacing: 2px;
      font-weight: 700;
    }
    #pvp-score-blue {
      font-size: clamp(22px, 5.5vw, 36px);
      font-weight: 900;
      color: #0af;
      text-shadow: 0 0 20px rgba(0,170,255,0.7);
    }
    #pvp-hint-blue {
      font-size: clamp(10px, 2.2vw, 12px);
      color: rgba(0,170,255,0.5);
    }

    /* ===== PVP 计分板（下方红方）===== */
    #pvp-hud-red {
      display: none;
      width: 100%;
      padding: 8px 20px;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 12px;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #pvp-hud-red .pvp-label {
      font-size: clamp(10px, 2.5vw, 13px);
      color: rgba(255,100,100,0.8);
      letter-spacing: 2px;
      font-weight: 700;
    }
    #pvp-score-red {
      font-size: clamp(22px, 5.5vw, 36px);
      font-weight: 900;
      color: #f55;
      text-shadow: 0 0 20px rgba(255,80,80,0.7);
    }
    #pvp-hint-red {
      font-size: clamp(10px, 2.2vw, 12px);
      color: rgba(255,100,100,0.5);
    }

    /* PVP 模式下显示双计分板，隐藏单人 HUD */
    body.pvp-mode #hud          { display: none; }
    body.pvp-mode #pvp-hud-blue { display: flex; }
    body.pvp-mode #pvp-hud-red  { display: flex; }

    /* ===== Canvas 区域 ===== */
    #canvas-wrap {
      position: relative;
      width: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #080810;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 50px rgba(0,150,255,0.1);
      touch-action: none;
    }

    /* ===== Overlay ===== */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,10,18,0.92);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 10;
      padding: 16px;
    }
    #overlay .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: clamp(11px, 2.5vw, 14px);
    }
    .result-box {
      display: flex;
      gap: clamp(15px, 5vw, 40px);
      margin: 4px 0;
    }
    .result-item { text-align: center; }
    .result-item .r-label {
      font-size: clamp(10px, 2.5vw, 12px);
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
    .result-item .r-value {
      font-size: clamp(22px, 5.5vw, 32px);
      font-weight: 700;
      margin-top: 4px;
    }

    /* ===== 模式选择 tab ===== */
    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 2px;
    }
    .mode-tab {
      padding: clamp(7px, 1.8vw, 10px) clamp(18px, 5vw, 32px);
      font-size: clamp(12px, 3vw, 15px);
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-tab.active[data-mode="pve"] {
      color: #0af;
      border-color: #0af;
      background: rgba(0,170,255,0.12);
    }
    .mode-tab.active[data-mode="pvp"] {
      color: #f55;
      border-color: #f55;
      background: rgba(255,80,80,0.12);
    }

    /* 难度选择（仅单人模式显示）*/
    .difficulty-select {
      display: flex;
      gap: clamp(8px, 2.5vw, 15px);
      margin: 4px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .diff-btn {
      padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 28px);
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 600;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
    .diff-btn.active { border-color: #a5f; background: rgba(170,85,255,0.2); box-shadow: 0 0 20px rgba(170,85,255,0.3); }
    .diff-btn[data-diff="easy"]   { color: #4f4; }
    .diff-btn[data-diff="normal"] { color: #fb0; }
    .diff-btn[data-diff="hard"]   { color: #f44; }
    #difficulty-row { transition: opacity 0.2s; }

    /* PVP 说明文字 */
    #pvp-info {
      display: none;
      color: rgba(255,255,255,0.4);
      font-size: clamp(11px, 2.5vw, 13px);
      text-align: center;
      line-height: 1.7;
    }

    /* 开始按钮 */
    #start-btn {
      padding: clamp(10px, 2.5vw, 14px) clamp(30px, 8vw, 50px);
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      color: #000;
      background: linear-gradient(135deg, #0af, #09d);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 4px 25px rgba(0,170,255,0.4);
      transition: transform 0.15s;
    }
    #start-btn:hover { transform: scale(1.05); }
    #controls-hint {
      color: rgba(255,255,255,0.3);
      font-size: clamp(10px, 2.5vw, 12px);
      text-align: center;
    }
    #version-tag {
      color: rgba(255,255,255,0.25);
      font-size: clamp(10px, 2.5vw, 13px);
      text-align: center;
      margin-top: 2px;
    }

    /* ===== 移动端按钮（单人模式）===== */
    #mobile-controls {
      display: none;
      gap: 16px;
      width: 100%;
      justify-content: space-between;
      padding: 0 4px;
    }
    /* ===== 移动端按钮（PVP 蓝方，上方）===== */
    #mobile-controls-blue {
      display: none;
      gap: 16px;
      width: 100%;
      justify-content: space-between;
      padding: 0 4px;
    }
    /* ===== 移动端按钮（PVP 红方，下方）===== */
    #mobile-controls-red {
      display: none;
      gap: 16px;
      width: 100%;
      justify-content: space-between;
      padding: 0 4px;
    }

    .mobile-btn {
      flex: 1;
      height: 52px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
      touch-action: none;
    }
    .mobile-btn.blue-btn {
      background: rgba(0,170,255,0.1);
      border-color: rgba(0,170,255,0.3);
      color: #0af;
    }
    .mobile-btn.blue-btn:active { background: rgba(0,170,255,0.25); }
    .mobile-btn.red-btn {
      background: rgba(255,80,80,0.1);
      border-color: rgba(255,80,80,0.3);
      color: #f55;
    }
    .mobile-btn.red-btn:active { background: rgba(255,80,80,0.25); }
    .mobile-btn:active { background: rgba(255,255,255,0.18); }

    /* 触摸设备的显示规则 */
    @media (pointer: coarse) {
      #mobile-controls       { display: flex; }  /* 单人模式默认显示，pvp时会被js控制 */
      #controls-hint         { display: none; }
    }
    /* PVP 模式下强制显示双方按钮，隐藏单人按钮 */
    body.pvp-mode #mobile-controls       { display: none !important; }
    body.pvp-mode #mobile-controls-blue  { display: flex !important; }
    body.pvp-mode #mobile-controls-red   { display: flex !important; }
    /* 非PVP模式隐藏PVP按钮 */
    body:not(.pvp-mode) #mobile-controls-blue { display: none !important; }
    body:not(.pvp-mode) #mobile-controls-red  { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="title">沉哒乒乓</div>
    <div id="best-record">最高连击: <span id="best-combo">0</span> / 最高连胜: <span id="best-streak">0</span></div>

    <!-- PVP 蓝方计分板（上方）-->
    <div id="pvp-hud-blue">
      <span class="pvp-label">🔵 蓝方</span>
      <span id="pvp-score-blue">0</span>
      <span id="pvp-hint-blue">W / S 控制</span>
    </div>

    <!-- 单人 HUD -->
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">玩家</span>
        <span class="hud-value" id="player-score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">等级</span>
        <span class="hud-value" id="level-display">1</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">连击</span>
        <span class="hud-value" id="combo-display">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">连胜</span>
        <span class="hud-value" id="streak-display">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">难度</span>
        <span class="hud-value" id="difficulty-display">标准</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">电脑</span>
        <span class="hud-value" id="ai-score">0</span>
      </div>
    </div>

    <!-- PVP 蓝方移动端按钮（上方）-->
    <div id="mobile-controls-blue">
      <div class="mobile-btn blue-btn" id="pvp-btn-blue-up">▲ 蓝方</div>
      <div class="mobile-btn blue-btn" id="pvp-btn-blue-down">▼ 蓝方</div>
    </div>

    <div id="canvas-wrap">
      <canvas id="canvas" width="800" height="500"></canvas>
      <div id="overlay">
        <p class="subtitle" id="overlay-subtitle">选择模式开始游戏</p>

        <!-- 模式切换 -->
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="pve">单人 PvE</button>
          <button class="mode-tab" data-mode="pvp">双人 PvP</button>
        </div>

        <!-- 难度选择（单人时显示）-->
        <div id="difficulty-row">
          <div class="difficulty-select">
            <button class="diff-btn" data-diff="easy">简单</button>
            <button class="diff-btn active" data-diff="normal">标准</button>
            <button class="diff-btn" data-diff="hard">困难</button>
          </div>
        </div>

        <!-- PVP 说明 -->
        <div id="pvp-info">
          🔵 蓝方 &nbsp;W / S&nbsp; 控制挡板<br>
          🔴 红方 &nbsp;↑ / ↓&nbsp; 控制挡板<br>
          先赢 <strong style="color:#fff">5</strong> 分者获胜
        </div>

        <div class="result-box" id="result-box" style="display:none"></div>
        <button id="start-btn">开始游戏</button>
        <div id="version-tag">v2.1</div>

        <div id="controls-hint">↑↓ 控制挡板 | 获胜后自动进入下一关</div>
      </div>
    </div>

    <!-- 单人移动端按钮 -->
    <div id="mobile-controls">
      <div class="mobile-btn" id="btn-up">▲</div>
      <div class="mobile-btn" id="btn-down">▼</div>
    </div>

    <!-- PVP 红方移动端按钮（下方）-->
    <div id="mobile-controls-red">
      <div class="mobile-btn red-btn" id="pvp-btn-red-up">▲ 红方</div>
      <div class="mobile-btn red-btn" id="pvp-btn-red-down">▼ 红方</div>
    </div>

    <!-- PVP 红方计分板（下方）-->
    <div id="pvp-hud-red">
      <span id="pvp-hint-red">↑ / ↓ 控制</span>
      <span id="pvp-score-red">0</span>
      <span class="pvp-label">红方 🔴</span>
    </div>

  </div>

<script>
// ==================== 配置 ====================
const CANVAS_W    = 800;
const CANVAS_H    = 500;
const PADDLE_W    = 16;
const PADDLE_H    = 90;
const PADDLE_SPEED= 9;
const BALL_SIZE   = 12;
const BASE_BALL_SPEED = 8;
const WIN_SCORE   = 5;

const AI_DIFFICULTY = {
  easy:   { speedMult: 0.5,  label: '简单' },
  normal: { speedMult: 0.75, label: '标准' },
  hard:   { speedMult: 1.0,  label: '困难' },
};

// ==================== 元素引用 ====================
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');

// ==================== 游戏状态 ====================
let gameMode  = 'pve';   // 'pve' | 'pvp'
let state     = 'idle';  // 'idle' | 'playing' | 'gameover'
let animationId = null;
let difficulty  = 'normal';

// 玩家/AI/PVP 数据
let player  = { x: 25, y: CANVAS_H/2 - PADDLE_H/2, score: 0, combo: 0 };
let ai      = { x: CANVAS_W - 25 - PADDLE_W, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };
// PVP 专用（左蓝右红）
let pvpBlue = { x: 25, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };
let pvpRed  = { x: CANVAS_W - 25 - PADDLE_W, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };

let ball = { x: CANVAS_W/2, y: CANVAS_H/2, vx: 0, vy: 0 };
// 方向键状态
let paddleDir = 0;        // 单人
let pvpBlueDir = 0;       // PVP 蓝方
let pvpRedDir  = 0;       // PVP 红方

let level = 1;
let ballSpeedMult = 1;

// ==================== 音效 ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playHitSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.05);
}

// ==================== 历史记录 ====================
let bestRecord   = JSON.parse(localStorage.getItem('ppqBestRecord')) || { combo: 0, streak: 0 };
let currentStreak = 0;

document.getElementById('best-combo').textContent  = bestRecord.combo;
document.getElementById('best-streak').textContent = bestRecord.streak;

// ==================== 模式切换 ====================
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    gameMode = tab.dataset.mode;
    const isPVP = gameMode === 'pvp';
    document.getElementById('difficulty-row').style.display = isPVP ? 'none' : '';
    document.getElementById('pvp-info').style.display       = isPVP ? 'block' : 'none';
    document.getElementById('controls-hint').textContent    = isPVP
      ? ''
      : '↑↓ 控制挡板 | 获胜后自动进入下一关';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('overlay-subtitle').style.display = '';
    document.getElementById('overlay-subtitle').style.cssText = '';
    document.getElementById('overlay-subtitle').textContent   = isPVP ? '本地双人对战' : '选择难度后开始游戏';
    document.getElementById('start-btn').textContent = '开始游戏';
  });
});

// ==================== 难度选择 ====================
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    updateHUD();
  });
});

// ==================== 初始化 ====================
function init() {
  lastTime = 0;
  ball = { x: CANVAS_W/2, y: CANVAS_H/2, vx: 0, vy: 0 };
  if (gameMode === 'pve') {
    player  = { x: 25, y: CANVAS_H/2 - PADDLE_H/2, score: 0, combo: 0 };
    ai      = { x: CANVAS_W - 25 - PADDLE_W, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };
    paddleDir = 0;
    level = 1;
    ballSpeedMult = 1;
  } else {
    pvpBlue = { x: 25, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };
    pvpRed  = { x: CANVAS_W - 25 - PADDLE_W, y: CANVAS_H/2 - PADDLE_H/2, score: 0 };
    pvpBlueDir = 0;
    pvpRedDir  = 0;
  }
  updateHUD();
}

// ==================== HUD 更新 ====================
function updateHUD() {
  if (gameMode === 'pve') {
    document.getElementById('player-score').textContent      = player.score;
    document.getElementById('ai-score').textContent          = ai.score;
    document.getElementById('level-display').textContent     = level;
    document.getElementById('combo-display').textContent     = player.combo;
    document.getElementById('streak-display').textContent    = currentStreak;
    document.getElementById('difficulty-display').textContent= AI_DIFFICULTY[difficulty].label;
  } else {
    document.getElementById('pvp-score-blue').textContent = pvpBlue.score;
    document.getElementById('pvp-score-red').textContent  = pvpRed.score;
  }
}

// ==================== 开始游戏 ====================
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  // 切换 body 样式
  if (gameMode === 'pvp') {
    document.body.classList.add('pvp-mode');
  } else {
    document.body.classList.remove('pvp-mode');
  }
  init();
  serveBall();
  if (animationId) cancelAnimationFrame(animationId);
  gameLoop();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ==================== 发球 ====================
function serveBall(fromCenter = false) {
  ball.x = CANVAS_W / 2;
  ball.y = CANVAS_H / 2;
  const dir   = Math.random() > 0.5 ? 1 : -1;
  const speed = BASE_BALL_SPEED * ballSpeedMult;
  ball.vx = dir * speed;
  ball.vy = fromCenter ? 0 : (Math.random() - 0.5) * speed * 0.7;
}

// ==================== 游戏循环 ====================
let lastTime = 0;
function gameLoop(timestamp) {
  if (state !== 'playing') return;
  const deltaTime = lastTime ? (timestamp - lastTime) / (1000/60) : 1;
  lastTime = timestamp;
  update(deltaTime);
  render();
  animationId = requestAnimationFrame(gameLoop);
}

// ==================== 更新 ====================
function update(dt) {
  if (gameMode === 'pve') {
    updatePVE(dt);
  } else {
    updatePVP(dt);
  }
}

function updatePVE(dt) {
  // 玩家移动
  player.y += paddleDir * PADDLE_SPEED * dt;
  player.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H, player.y));

  // AI 移动
  const aiSpeed  = PADDLE_SPEED * AI_DIFFICULTY[difficulty].speedMult * (0.8 + level * 0.08);
  const aiTarget = ball.y - PADDLE_H / 2;
  if (ball.vx > 0) {
    if (ai.y < aiTarget - 8) ai.y += aiSpeed * dt;
    else if (ai.y > aiTarget + 8) ai.y -= aiSpeed * dt;
  } else {
    if (ai.y < aiTarget - 30) ai.y += aiSpeed * 0.5 * dt;
    else if (ai.y > aiTarget + 30) ai.y -= aiSpeed * 0.5 * dt;
  }
  ai.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H, ai.y));

  moveBall(dt);

  // 玩家接球
  if (ball.vx < 0 &&
      ball.x <= player.x + PADDLE_W && ball.x + BALL_SIZE >= player.x &&
      ball.y + BALL_SIZE >= player.y && ball.y <= player.y + PADDLE_H) {
    const speed  = BASE_BALL_SPEED * ballSpeedMult;
    ball.vx = Math.abs(ball.vx) * 1.05;
    ball.x  = player.x + PADDLE_W + 1;
    ball.vy = ((ball.y - (player.y + PADDLE_H/2)) / (PADDLE_H/2)) * speed;
    player.combo++;
    if (player.combo > bestRecord.combo) {
      bestRecord.combo = player.combo;
      localStorage.setItem('ppqBestRecord', JSON.stringify(bestRecord));
      document.getElementById('best-combo').textContent = bestRecord.combo;
    }
    playHitSound();
    checkLevelUp();
  }

  // AI 接球
  if (ball.vx > 0 &&
      ball.x + BALL_SIZE >= ai.x && ball.x <= ai.x + PADDLE_W &&
      ball.y + BALL_SIZE >= ai.y && ball.y <= ai.y + PADDLE_H) {
    const speed = BASE_BALL_SPEED * ballSpeedMult;
    ball.vx = -Math.abs(ball.vx) * 1.05;
    ball.x  = ai.x - BALL_SIZE - 1;
    ball.vy = ((ball.y - (ai.y + PADDLE_H/2)) / (PADDLE_H/2)) * speed;
    playHitSound();
  }

  // 得分
  if (ball.x < -20) {
    ai.score++;
    player.combo = 0;
    level = 1;
    ballSpeedMult = 1;
    updateHUD();
    if (ai.score >= WIN_SCORE) gameOver(false);
    else serveBall(true);
  }
  if (ball.x > CANVAS_W + 20) {
    player.score++;
    updateHUD();
    if (player.score >= WIN_SCORE) gameOver(true);
    else serveBall(true);
  }
}

function updatePVP(dt) {
  // 蓝方移动
  pvpBlue.y += pvpBlueDir * PADDLE_SPEED * dt;
  pvpBlue.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H, pvpBlue.y));

  // 红方移动
  pvpRed.y += pvpRedDir * PADDLE_SPEED * dt;
  pvpRed.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H, pvpRed.y));

  moveBall(dt);

  // 蓝方接球（左侧）
  if (ball.vx < 0 &&
      ball.x <= pvpBlue.x + PADDLE_W && ball.x + BALL_SIZE >= pvpBlue.x &&
      ball.y + BALL_SIZE >= pvpBlue.y && ball.y <= pvpBlue.y + PADDLE_H) {
    const speed = BASE_BALL_SPEED * ballSpeedMult;
    ball.vx = Math.abs(ball.vx) * 1.05;
    ball.x  = pvpBlue.x + PADDLE_W + 1;
    ball.vy = ((ball.y - (pvpBlue.y + PADDLE_H/2)) / (PADDLE_H/2)) * speed;
    playHitSound();
  }

  // 红方接球（右侧）
  if (ball.vx > 0 &&
      ball.x + BALL_SIZE >= pvpRed.x && ball.x <= pvpRed.x + PADDLE_W &&
      ball.y + BALL_SIZE >= pvpRed.y && ball.y <= pvpRed.y + PADDLE_H) {
    const speed = BASE_BALL_SPEED * ballSpeedMult;
    ball.vx = -Math.abs(ball.vx) * 1.05;
    ball.x  = pvpRed.x - BALL_SIZE - 1;
    ball.vy = ((ball.y - (pvpRed.y + PADDLE_H/2)) / (PADDLE_H/2)) * speed;
    playHitSound();
  }

  // 得分
  if (ball.x < -20) {
    pvpRed.score++;
    updateHUD();
    if (pvpRed.score >= WIN_SCORE) gameOverPVP('red');
    else serveBall(true);
  }
  if (ball.x > CANVAS_W + 20) {
    pvpBlue.score++;
    updateHUD();
    if (pvpBlue.score >= WIN_SCORE) gameOverPVP('blue');
    else serveBall(true);
  }
}

// 球移动（通用）
function moveBall(dt) {
  const speed = BASE_BALL_SPEED * ballSpeedMult;
  ball.x += ball.vx * (speed / BASE_BALL_SPEED) * dt;
  ball.y += ball.vy * (speed / BASE_BALL_SPEED) * dt;
  if (ball.y <= 0)              { ball.y = 0;              ball.vy =  Math.abs(ball.vy); }
  if (ball.y >= CANVAS_H - BALL_SIZE) { ball.y = CANVAS_H - BALL_SIZE; ball.vy = -Math.abs(ball.vy); }
}

// 升级
function checkLevelUp() {
  if (player.combo > 0 && player.combo % 3 === 0) {
    level = Math.min(10, level + 1);
    ballSpeedMult = 1 + (level - 1) * 0.15;
    updateHUD();
  }
}

// ==================== 渲染 ====================
function render() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let i = 0; i < CANVAS_W; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, CANVAS_H); ctx.stroke();
  }
  for (let i = 0; i < CANVAS_H; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(CANVAS_W, i); ctx.stroke();
  }

  // 中线
  ctx.setLineDash([15, 15]);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(CANVAS_W/2, 0); ctx.lineTo(CANVAS_W/2, CANVAS_H);
  ctx.stroke();
  ctx.setLineDash([]);

  if (gameMode === 'pve') {
    renderPaddle(player, '#0af', '#068');
    renderPaddle(ai,     '#f0a', '#c08');
  } else {
    renderPaddle(pvpBlue, '#0af', '#068');
    renderPaddle(pvpRed,  '#f55', '#a22');
  }

  // 球
  const cx = ball.x + BALL_SIZE/2;
  const cy = ball.y + BALL_SIZE/2;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, BALL_SIZE * 1.5);
  glow.addColorStop(0, 'rgba(255,255,255,0.8)');
  glow.addColorStop(0.5, 'rgba(150,200,255,0.3)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, BALL_SIZE * 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, BALL_SIZE/2, 0, Math.PI * 2);
  ctx.fill();
}

function renderPaddle(p, c1, c2) {
  const grad = ctx.createLinearGradient(p.x, p.y, p.x + PADDLE_W, p.y);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle   = grad;
  ctx.shadowColor = c1;
  ctx.shadowBlur  = 15;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, PADDLE_W, PADDLE_H, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ==================== 游戏结束（PVE）====================
function gameOver(playerWin) {
  state = 'gameover';
  cancelAnimationFrame(animationId);
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';

  const box = document.getElementById('result-box');
  box.style.display = 'flex';
  box.innerHTML = `
    <div class="result-item">
      <div class="r-label">玩家</div>
      <div class="r-value" style="color:#0af">${player.score}</div>
    </div>
    <div class="result-item">
      <div class="r-label">电脑</div>
      <div class="r-value" style="color:#f0a">${ai.score}</div>
    </div>
    <div class="result-item">
      <div class="r-label">等级</div>
      <div class="r-value" style="color:#fb0">${level}</div>
    </div>`;

  document.getElementById('overlay-subtitle').textContent = playerWin ? '🎉 获胜！' : '游戏结束';
  document.getElementById('overlay-subtitle').style.cssText = playerWin
    ? 'font-size:clamp(18px,5vw,28px);font-weight:900;color:#fb0;text-shadow:0 0 20px rgba(255,187,0,0.8)'
    : 'font-size:clamp(18px,5vw,28px);font-weight:900;color:#f55;text-shadow:0 0 20px rgba(255,85,85,0.8)';
  document.getElementById('start-btn').textContent = playerWin ? '下一关' : '重新开始';

  if (player.combo > bestRecord.combo) {
    bestRecord.combo = player.combo;
    localStorage.setItem('ppqBestRecord', JSON.stringify(bestRecord));
    document.getElementById('best-combo').textContent = bestRecord.combo;
  }
  if (playerWin) {
    currentStreak++;
    if (currentStreak > bestRecord.streak) {
      bestRecord.streak = currentStreak;
      localStorage.setItem('ppqBestRecord', JSON.stringify(bestRecord));
      document.getElementById('best-streak').textContent = bestRecord.streak;
    }
  } else {
    currentStreak = 0;
  }
}

// ==================== 游戏结束（PVP）====================
function gameOverPVP(winner) {
  state = 'gameover';
  cancelAnimationFrame(animationId);
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';

  const winLabel = winner === 'blue' ? '🔵 蓝方获胜！' : '🔴 红方获胜！';
  const winColor = winner === 'blue' ? '#0af' : '#f55';
  const subtitle = document.getElementById('overlay-subtitle');
  subtitle.style.display = '';
  subtitle.textContent = winLabel;
  subtitle.style.cssText =
    `font-size:clamp(18px,5vw,28px);font-weight:900;color:${winColor};text-shadow:0 0 20px ${winColor}88`;

  const box = document.getElementById('result-box');
  box.style.display = 'flex';
  box.innerHTML = `
    <div class="result-item">
      <div class="r-label">🔵 蓝方</div>
      <div class="r-value" style="color:#0af">${pvpBlue.score}</div>
    </div>
    <div class="result-item">
      <div class="r-label">🔴 红方</div>
      <div class="r-value" style="color:#f55">${pvpRed.score}</div>
    </div>`;

  document.getElementById('start-btn').textContent = '再来一局';
  // 恢复 subtitle 样式（下次 overlay 重新打开时）
  document.getElementById('start-btn').onclick = () => {
    subtitle.style.cssText = '';
    startGame();
  };
}

// ==================== 输入处理 ====================

// 键盘
const keysDown = new Set();
document.addEventListener('keydown', e => {
  if (keysDown.has(e.key)) return;
  keysDown.add(e.key);
  if (gameMode === 'pve') {
    if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') paddleDir = -1;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') paddleDir =  1;
  } else {
    // 蓝方 W/S
    if (e.key === 'w' || e.key === 'W') pvpBlueDir = -1;
    if (e.key === 's' || e.key === 'S') pvpBlueDir =  1;
    // 红方 ↑↓
    if (e.key === 'ArrowUp')   pvpRedDir = -1;
    if (e.key === 'ArrowDown') pvpRedDir =  1;
  }
});
document.addEventListener('keyup', e => {
  keysDown.delete(e.key);
  if (gameMode === 'pve') {
    if ((e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') && paddleDir === -1) paddleDir = 0;
    if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && paddleDir ===  1) paddleDir = 0;
  } else {
    if ((e.key === 'w' || e.key === 'W') && pvpBlueDir === -1) pvpBlueDir = 0;
    if ((e.key === 's' || e.key === 'S') && pvpBlueDir ===  1) pvpBlueDir = 0;
    if (e.key === 'ArrowUp'   && pvpRedDir === -1) pvpRedDir = 0;
    if (e.key === 'ArrowDown' && pvpRedDir ===  1) pvpRedDir = 0;
  }
});

// 触摸（仅单人模式，PVP 模式触摸禁用）
let touchActive = false;
canvas.addEventListener('touchstart', e => {
  if (gameMode === 'pvp') return; // PVP 禁止触摸控制
  e.preventDefault();
  if (state !== 'playing') return;
  touchActive = true;
  const touch = e.touches[0];
  const rect  = canvas.getBoundingClientRect();
  player.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H,
    (touch.clientY - rect.top) * (CANVAS_H / rect.height) - PADDLE_H / 2));
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (gameMode === 'pvp') return;
  e.preventDefault();
  if (state !== 'playing' || !touchActive) return;
  const touch = e.touches[0];
  const rect  = canvas.getBoundingClientRect();
  player.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H,
    (touch.clientY - rect.top) * (CANVAS_H / rect.height) - PADDLE_H / 2));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (gameMode === 'pvp') return;
  e.preventDefault();
  touchActive = false;
  paddleDir = 0;
}, { passive: false });

// 鼠标（仅 PVE）
canvas.addEventListener('mousemove', e => {
  if (gameMode !== 'pve' || state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  player.y = Math.max(0, Math.min(CANVAS_H - PADDLE_H,
    (e.clientY - rect.top) * (CANVAS_H / rect.height) - PADDLE_H / 2));
});

// ===== 单人移动端按钮 =====
function bindMobileBtn(btn, dir, getDir, setDir) {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing') return;
    setDir(dir);
  }, { passive: false });
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    if (getDir() === dir) setDir(0);
  }, { passive: false });
  btn.addEventListener('mousedown', () => { if (state === 'playing') setDir(dir); });
  btn.addEventListener('mouseup',   () => { if (getDir() === dir) setDir(0); });
}

bindMobileBtn(
  document.getElementById('btn-up'),   -1,
  () => paddleDir, v => paddleDir = v
);
bindMobileBtn(
  document.getElementById('btn-down'),  1,
  () => paddleDir, v => paddleDir = v
);

// ===== PVP 蓝方移动端按钮 =====
bindMobileBtn(
  document.getElementById('pvp-btn-blue-up'),   -1,
  () => pvpBlueDir, v => pvpBlueDir = v
);
bindMobileBtn(
  document.getElementById('pvp-btn-blue-down'),  1,
  () => pvpBlueDir, v => pvpBlueDir = v
);

// ===== PVP 红方移动端按钮 =====
bindMobileBtn(
  document.getElementById('pvp-btn-red-up'),   -1,
  () => pvpRedDir, v => pvpRedDir = v
);
bindMobileBtn(
  document.getElementById('pvp-btn-red-down'),  1,
  () => pvpRedDir, v => pvpRedDir = v
);

// ==================== 开始按钮 ====================
document.getElementById('start-btn').addEventListener('click', startGame);

// ==================== 初始渲染 ====================
render();
</script>
